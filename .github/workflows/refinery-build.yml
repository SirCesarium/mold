name: Refinery Build
"on":
    push:
        tags:
            - v*
    release:
        types:
            - created
permissions:
    contents: write
    packages: write
jobs:
    setup:
        name: Setup and Global Checks
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Setup Rust
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                cache: true
            - name: Install cargo-deb
              if: runner.os == 'Linux'
              run: cargo install cargo-deb
              shell: bash
            - name: Install cargo-generate-rpm
              if: runner.os == 'Linux'
              run: cargo install cargo-generate-rpm
              shell: bash
            - name: Install cargo-wix
              if: runner.os == 'Windows'
              run: cargo install cargo-wix
              shell: bash
    build:
        name: Build ${{ matrix.artifact }} (${{ matrix.os }}-${{ matrix.arch }})
        runs-on: ${{ matrix.runs_on }}
        needs:
            - setup
        strategy:
            fail-fast: true
            matrix:
                include:
                    - artifact: type-forge
                      os: darwin
                      arch: aarch64
                      runs_on: macos-latest
                    - artifact: type-forge
                      os: darwin
                      arch: x86_64
                      runs_on: macos-latest
                    - artifact: type-forge
                      os: linux
                      arch: aarch64
                      runs_on: ubuntu-latest
                      abi: gnu
                    - artifact: type-forge
                      os: linux
                      arch: aarch64
                      runs_on: ubuntu-latest
                      abi: musl
                    - artifact: type-forge
                      os: linux
                      arch: x86_64
                      runs_on: ubuntu-latest
                      abi: gnu
                    - artifact: type-forge
                      os: linux
                      arch: x86_64
                      runs_on: ubuntu-latest
                      abi: musl
                    - artifact: type-forge
                      os: windows
                      arch: x86_64
                      runs_on: windows-latest
                      abi: gnu
                    - artifact: type-forge
                      os: windows
                      arch: x86_64
                      runs_on: windows-latest
                      abi: msvc
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Setup Rust
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                cache: true
            - name: Install cargo-deb
              if: runner.os == 'Linux'
              run: cargo install cargo-deb
              shell: bash
            - name: Install cargo-generate-rpm
              if: runner.os == 'Linux'
              run: cargo install cargo-generate-rpm
              shell: bash
            - name: Install cargo-wix
              if: runner.os == 'Windows'
              run: cargo install cargo-wix
              shell: bash
            - name: Build Artifact
              uses: SirCesarium/refinery@v2.0.6
              with:
                abi: ${{ matrix.abi }}
                arch: ${{ matrix.arch }}
                artifact: ${{ matrix.artifact }}
                os: ${{ matrix.os }}
                version: v2.0.6
    teardown:
        name: Global Post-Build Tasks
        runs-on: ubuntu-latest
        needs:
            - build
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Download All Artifacts
              uses: actions/download-artifact@v8
              with:
                merge-multiple: true
                path: ./artifacts
            - name: 'Post-Build (Global): publish-crates'
              uses: ./.github/actions/publish-crates
              with:
                token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    release:
        name: Release Artifacts
        runs-on: ubuntu-latest
        needs:
            - build
            - teardown
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - name: Download Artifacts
              uses: actions/download-artifact@v8
              with:
                merge-multiple: true
                path: ./artifacts
            - name: List Artifacts
              run: find ./artifacts -type f | sort
              shell: bash
            - name: Publish Release
              uses: softprops/action-gh-release@v3
              with:
                fail_on_unmatched_files: true
                files: ./artifacts/**/*
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
